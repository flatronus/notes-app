<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Нотатки</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#faf8f5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Нотатки">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  /* ── System font stack — no Google Fonts needed ── */
  :root {
    --bg: #f0ede8;
    --surface: #faf8f5;
    --ink: #1a1814;
    --ink-muted: #7a756e;
    --ink-faint: #c4bfb8;
    --accent: #c0392b;
    --accent-soft: #f9ecea;
    --border: #e2ddd7;
    --shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
    --radius: 14px;
    --radius-sm: 8px;
    --font: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --tab-h: 64px;
    --top-h: 60px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    height: var(--top-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    flex: 1;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 320px;
  }

  .search-wrap input {
    width: 100%;
    height: 36px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    padding: 0 12px 0 34px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--ink);
    outline: none;
    user-select: text;
    -webkit-user-select: text;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
    pointer-events: none;
  }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px calc(var(--tab-h) + 14px);
    -webkit-overflow-scrolling: touch;
  }

  /* TABS */
  .tabbar {
    height: var(--tab-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0 4px;
  }

  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 100%;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--ink-muted);
    font-family: var(--font);
    font-size: 10px;
    font-weight: 500;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn svg { width: 22px; height: 22px; }

  .tab-new { flex: 1.2; }
  .tab-new .tab-inner {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(192,57,43,0.4);
  }
  .tab-new svg { color: #fff; width: 24px; height: 24px; }

  /* NOTE CARD */
  .note-card {
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    word-break: break-word;
    display: flex;
    overflow: hidden;
    background: #ffffff;
  }

  .note-label-bar {
    width: 12px;
    flex-shrink: 0;
    border-radius: 0;
  }

  .note-body {
    flex: 1;
    padding: 14px 15px;
    min-width: 0;
  }

  .note-text {
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    user-select: text;
    -webkit-user-select: text;
    color: #1a1814;
  }

  .note-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .note-date {
    font-size: 11px;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .note-reminder-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(192,57,43,0.08);
    border-radius: 6px;
    padding: 2px 7px;
  }

  .note-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .note-action-btn {
    border: none;
    background: rgba(0,0,0,0.06);
    border-radius: 7px;
    padding: 7px 12px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--ink);
  }
  .note-action-btn.danger  { color: var(--accent); }
  .note-action-btn.success { color: #27ae60; }
  .note-action-btn.restore { background: rgba(39,174,96,0.12); color: #27ae60; }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--ink-muted);
    text-align: center;
    gap: 12px;
  }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.35; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,18,15,0.55);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 600px;
    padding: 16px 16px 28px;
    max-height: 90vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .modal-handle {
    width: 38px;
    height: 4px;
    background: var(--ink-faint);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .note-textarea {
    width: 100%;
    min-height: 130px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    font-family: var(--font);
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
    outline: none;
    user-select: text;
    -webkit-user-select: text;
  }

  /* COLOR ROW */
  .form-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .form-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    min-width: 80px;
  }

  .color-swatches { display: flex; gap: 7px; flex-wrap: wrap; }

  .color-swatch {
    width: 40px;
    height: 24px;
    border-radius: 6px;
    border: 2.5px solid transparent;
    cursor: pointer !important;
    pointer-events: all !important;
    transition: transform .15s;
    -webkit-tap-highlight-color: rgba(0,0,0,0.1);
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: var(--ink); }
  .color-swatch.swatch-none {
    background: var(--bg);
    border: 2px dashed var(--ink-faint);
  }

  /* DATE INPUT */
  .date-label {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 11px;
    background: var(--bg);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    color: var(--ink);
  }
  .date-label svg { width: 15px; height: 15px; color: var(--accent); flex-shrink: 0; }

  input[type="datetime-local"] {
    font-family: var(--font);
    font-size: 13px;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    user-select: text;
    -webkit-user-select: text;
  }

  .clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 4px;
  }

  /* VOICE */
  .voice-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    background: var(--bg);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink);
  }
  .voice-btn.recording {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
  }
  .voice-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: none;
  }
  .voice-btn.recording .voice-dot { display: block; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* MODAL ACTIONS */
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }

  .btn-save {
    flex: 1;
    height: 46px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-cancel {
    height: 46px;
    padding: 0 18px;
    background: var(--bg);
    color: var(--ink-muted);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 14px;
    cursor: pointer;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(var(--tab-h) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    z-index: 500;
    transition: opacity .3s, transform .3s;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @keyframes loaderPulse {
    0%, 100% { transform: scale(0.6); opacity: 0.4; }
    50%       { transform: scale(1);   opacity: 1; }
  }
  .loader-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: loaderPulse 1s ease-in-out infinite;
  }


</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:var(--bg);">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="1.5">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <line x1="7" y1="8" x2="17" y2="8"/>
    <line x1="7" y1="12" x2="17" y2="12"/>
    <line x1="7" y1="16" x2="13" y2="16"/>
  </svg>
  <div style="display:flex;gap:6px;align-items:center;">
    <div class="loader-dot"></div>
    <div class="loader-dot" style="animation-delay:.2s"></div>
    <div class="loader-dot" style="animation-delay:.4s"></div>
  </div>
</div>

<!-- AUTH SCREEN -->
<div id="authScreen" style="display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:24px;background:var(--bg);padding:32px;text-align:center;">
  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="1.5">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <line x1="7" y1="8" x2="17" y2="8"/>
    <line x1="7" y1="12" x2="17" y2="12"/>
    <line x1="7" y1="16" x2="13" y2="16"/>
  </svg>
  <div>
    <div style="font-size:22px;font-weight:700;margin-bottom:6px;">Нотатки</div>
    <div style="font-size:14px;color:var(--ink-muted);">Увійдіть щоб синхронізувати нотатки між пристроями</div>
  </div>
  <button data-action="signin" style="display:flex;align-items:center;gap:10px;padding:12px 24px;background:#fff;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Увійти через Google
  </button>
</div>

<!-- APP SCREEN -->
<div id="appScreen" style="display:none;flex-direction:column;height:100vh;">

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title" id="topbarTitle">Нотатки</div>
  <span id="userEmail" style="font-size:11px;color:var(--ink-muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
  <button data-action="signout" style="border:none;background:none;cursor:pointer;color:var(--ink-muted);font-size:11px;font-family:var(--font);padding:4px 6px;border-radius:6px;border:1px solid var(--border);">Вийти</button>
  <div class="search-wrap">
    <span class="search-icon">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
        <circle cx="8.5" cy="8.5" r="5.5"/><path d="M13.5 13.5L17 17"/>
      </svg>
    </span>
    <input type="text" id="searchInput" placeholder="Пошук…">
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="mainContent"></div>

<!-- TAB BAR -->
<nav class="tabbar">
  <button class="tab-btn tab-new" data-action="new">
    <div class="tab-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </button>

  <button class="tab-btn active" id="tabNotes" data-action="tab" data-tab="notes">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <line x1="7" y1="8" x2="17" y2="8"/>
      <line x1="7" y1="12" x2="17" y2="12"/>
      <line x1="7" y1="16" x2="13" y2="16"/>
    </svg>
    Нотатки
  </button>

  <button class="tab-btn" id="tabReminders" data-action="tab" data-tab="reminders">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    Нагадування
  </button>

  <button class="tab-btn" id="tabDeleted" data-action="tab" data-tab="deleted">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/>
      <path d="M9 6V4h6v2"/>
    </svg>
    Видалені
  </button>
</nav>

<!-- CREATE/EDIT MODAL -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Нова нотатка</div>

    <textarea class="note-textarea" id="noteText" placeholder="Введіть текст нотатки…"></textarea>

    <!-- Voice -->
    <div class="form-row">
      <button class="voice-btn" id="voiceBtn" data-action="voice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span class="voice-dot"></span>
        <span id="voiceBtnLabel">Диктувати</span>
      </button>
    </div>

    <!-- Color -->
    <div class="form-row">
      <span class="form-label">Ярлик:</span>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>

    <!-- Reminder -->
    <div class="form-row">
      <span class="form-label">Нагадування:</span>
      <label class="date-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <input type="datetime-local" id="reminderInput">
      </label>
      <button class="clear-btn" data-action="cleardate">✕</button>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" data-action="close">Скасувати</button>
      <button class="btn-save" data-action="save">Зберегти</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">

import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy }

  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// ── FIREBASE CONFIG ──
const fbApp = initializeApp({
  apiKey:            "AIzaSyAQDvjtD4mmBS6r4TYqfq_SPYPL-7QVGwg",
  authDomain:        "notes-app-b58f8.firebaseapp.com",

const auth = getAuth(fbApp);
const fsdb = getFirestore(fbApp);

let userId     = null;

const notesCol   = () => collection(fsdb, 'users', userId, 'notes');
const deletedCol = () => collection(fsdb, 'users', userId, 'deleted');

// ── APP STATE ──
// Label (left border) colors
const LABEL_COLORS = [
  { hex: '#ffffff', name: 'Без ярлика' },
  { hex: '#e53935', name: 'Червоний'   },
  { hex: '#fb8c00', name: 'Помаранчевий' },
  { hex: '#fdd835', name: 'Жовтий'     },
  { hex: '#43a047', name: 'Зелений'    },
  { hex: '#1e88e5', name: 'Синій'      },
  { hex: '#8e24aa', name: 'Фіолетовий' },
  { hex: '#6d4c41', name: 'Коричневий' },
];
const REMINDER_LABEL = '#e53935'; // red label for reminders
let notes        = [];
let deletedNotes = [];
let currentTab   = 'notes';
let editingId    = null;
let selColor     = '#43a047'; // default green label
let recognition  = null;
let isRecording  = false;

// ── HELPERS ──
function uid()    { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function isLight(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000>160;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDT(iso) {
  if(!iso)return'';
  return new Date(iso).toLocaleString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── FIREBASE OPS ──
const fbSaveNote    = n  => userId && setDoc(doc(notesCol(),   n.id), n);
const fbDeleteNote  = id => userId && deleteDoc(doc(notesCol(),   id));
const fbSaveDeleted = n  => userId && setDoc(doc(deletedCol(), n.id), n);
const fbDelDeleted  = id => userId && deleteDoc(doc(deletedCol(), id));

// ── RENDER ──
function renderNotes() {
  const content = document.getElementById('mainContent');
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = currentTab==='deleted' ? deletedNotes
           : currentTab==='reminders' ? notes.filter(n=>!!n.reminder)
           : notes;
  if(q) list=list.filter(n=>n.text.toLowerCase().includes(q)||
    (n.reminder?fmtDT(n.reminder):fmtDT(n.created)).toLowerCase().includes(q));
  if(!list.length){
    const msgs={notes:'Натисніть + щоб створити нотатку',reminders:'Нагадувань ще немає',deleted:'Видалені нотатки порожні'};
    content.innerHTML=`<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <line x1="7" y1="8" x2="17" y2="8"/>
        <line x1="7" y1="12" x2="17" y2="12"/>
      </svg>
      <p>${q?'Нічого не знайдено':msgs[currentTab]}</p></div>`;
    return;
  }
  content.innerHTML=list.map(n=>{
    // Default label is green for notes without labelColor (old notes) or newly created
    const effectiveLabel = n.labelColor !== undefined ? n.labelColor : '#43a047';
    const hasLabel = effectiveLabel && effectiveLabel !== '#ffffff';
    const cardBg   = n.reminder ? '#fffde7' : '#ffffff'; // жовтий для нагадувань
    const isDel    = currentTab==='deleted';
    const badge    = n.reminder
      ? `<span class="note-reminder-badge">🔔 ${fmtDT(n.reminder)}</span>`
      : `<span class="note-date">🕐 ${fmtDT(n.created)}</span>`;
    const actions  = isDel
      ? `<button class="note-action-btn restore" data-action="restore" data-id="${n.id}">↩ Відновити</button>
         <button class="note-action-btn danger" data-action="permdelete" data-id="${n.id}">✕ Видалити назавжди</button>`
      : `<button class="note-action-btn" data-action="edit" data-id="${n.id}">✏ Редагувати</button>
         <button class="note-action-btn success" data-action="complete" data-id="${n.id}">✓ Виконано</button>`;
    const labelBar = hasLabel
      ? `<div class="note-label-bar" style="background:${effectiveLabel}"></div>`
      : '';
    return `<div class="note-card" style="background:${cardBg}">
      ${labelBar}
      <div class="note-body">
        <div class="note-text">${esc(n.text)}</div>
        <div class="note-meta">${badge}</div>
        <div class="note-actions">${actions}</div>
      </div></div>`;
  }).join('');
}

// ── TABS ──
function switchTab(tab) {
  currentTab=tab;
  ['Notes','Reminders','Deleted'].forEach(t=>document.getElementById('tab'+t)?.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1))?.classList.add('active');
  document.getElementById('topbarTitle').textContent={notes:'Нотатки',reminders:'Нагадування',deleted:'Видалені'}[tab];
  renderNotes();
}

// ── COLOR SWATCHES ──
function buildSwatches() {
  const wrap = document.getElementById('colorSwatches');
  wrap.innerHTML = LABEL_COLORS.map(c => {
    const isNone = c.hex === '#ffffff';
    const bg = isNone ? 'var(--bg)' : c.hex;
    const sel = selColor === c.hex;
    return `<div class="color-swatch${sel?' selected':''}${isNone?' swatch-none':''}"
      style="background:${bg};border-color:${sel?'#1a1814':'transparent'}"
      title="${c.name}" data-color="${c.hex}"></div>`;
  }).join('');
  // Attach direct listeners — reliable on all browsers including mobile
  wrap.querySelectorAll('.color-swatch').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      selColor = this.dataset.color;
      wrap.querySelectorAll('.color-swatch').forEach(s => {
        const active = s.dataset.color === selColor;
        s.classList.toggle('selected', active);
        s.style.borderColor = active ? '#1a1814' : 'transparent';
      });
    });
    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      this.click();
    });
  });
}

// ── MODAL ──
function openCreateModal() {
  editingId=null;
  document.getElementById('modalTitle').textContent='Нова нотатка';
  document.getElementById('noteText').value='';
  document.getElementById('reminderInput').value='';
  selColor='#43a047'; buildSwatches();
  document.getElementById('noteModal').classList.add('open');
  setTimeout(()=>document.getElementById('noteText').focus(),200);
}
function openEdit(id) {
  const n=notes.find(n=>n.id===id); if(!n) return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Редагувати нотатку';
  document.getElementById('noteText').value=n.text;
  if(n.reminder){
    const d=new Date(n.reminder); d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
    document.getElementById('reminderInput').value=d.toISOString().slice(0,16);
  } else { document.getElementById('reminderInput').value=''; }
  selColor=n.labelColor||'#ffffff'; buildSwatches();
  document.getElementById('noteModal').classList.add('open');
  setTimeout(()=>document.getElementById('noteText').focus(),200);
}
function closeModal() { document.getElementById('noteModal').classList.remove('open'); stopVoice(); }

function saveNote() {
  const text=document.getElementById('noteText').value.trim();
  if(!text){toast('Введіть текст нотатки');return;}
  const raw=document.getElementById('reminderInput').value;
  const reminder=raw?new Date(raw).toISOString():null;
  const labelColor = selColor; // user always picks label; reminder gets red label only if default green kept
  if(editingId){
    const i=notes.findIndex(n=>n.id===editingId);
    if(i!==-1){notes[i]={...notes[i],text,labelColor,reminder};fbSaveNote(notes[i]);}
  } else {
    const note={id:uid(),text,labelColor,reminder,created:new Date().toISOString()};
    notes.unshift(note); fbSaveNote(note);
  }
  closeModal(); renderNotes();
  if(reminder) scheduleNotif(notes.find(n=>n.text===text&&n.reminder===reminder));
}

// ── NOTE ACTIONS ──
function completeNote(id) {
  const i=notes.findIndex(n=>n.id===id); if(i===-1)return;
  const del={...notes[i],deletedAt:new Date().toISOString()};
  deletedNotes.unshift(del); fbSaveDeleted(del); fbDeleteNote(notes[i].id);
  notes.splice(i,1); renderNotes(); toast('Переміщено до видалених');
}
function restoreNote(id) {
  const i=deletedNotes.findIndex(n=>n.id===id); if(i===-1)return;
  const n={...deletedNotes[i]}; delete n.deletedAt;
  notes.unshift(n); fbSaveNote(n); fbDelDeleted(deletedNotes[i].id);
  deletedNotes.splice(i,1); renderNotes(); toast('Нотатку відновлено');
}
function permDelete(id) {
  fbDelDeleted(id); deletedNotes=deletedNotes.filter(n=>n.id!==id);
  renderNotes(); toast('Видалено назавжди');
}

// ── VOICE ──
function toggleVoice() {
  if(isRecording){stopVoice();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Диктування не підтримується');return;}
  recognition=new SR(); recognition.lang='uk-UA'; recognition.interimResults=true; recognition.continuous=true;
  const ta=document.getElementById('noteText'), base=ta.value;
  recognition.onresult=ev=>{
    let fin='',tmp='';
    for(let i=ev.resultIndex;i<ev.results.length;i++)
      ev.results[i].isFinal?(fin+=ev.results[i][0].transcript):(tmp+=ev.results[i][0].transcript);
    ta.value=base+(base&&(fin||tmp)?' ':'')+( fin||tmp);
  };
  recognition.onerror=()=>stopVoice();
  recognition.onend=()=>{if(isRecording)recognition.start();};
  recognition.start(); isRecording=true;
  document.getElementById('voiceBtn').classList.add('recording');
  document.getElementById('voiceBtnLabel').textContent='Зупинити';
}
function stopVoice() {
  if(recognition){recognition.stop();recognition=null;}
  isRecording=false;
  const btn=document.getElementById('voiceBtn');
  if(btn){btn.classList.remove('recording');document.getElementById('voiceBtnLabel').textContent='Диктувати';}
}

// ── NOTIFICATIONS ──
let notifId=1000;
// ── SOUND: pip-pip using Web Audio API ──
function playPipPip() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 180].forEach(delay => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime + delay/1000);
      gain.gain.setValueAtTime(0.4, ctx.currentTime + delay/1000);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay/1000 + 0.15);
      osc.start(ctx.currentTime + delay/1000);
      osc.stop(ctx.currentTime + delay/1000 + 0.15);
    });
  } catch(e) { console.warn('Audio:', e); }
}

function scheduleNotif(note) {
  if(!note||!note.reminder)return;
  const at=new Date(note.reminder); if(at<=new Date())return;
  const ms=at.getTime()-Date.now();
  setTimeout(() => {
    playPipPip();
    if('Notification' in window)
      Notification.requestPermission().then(p=>{
        if(p==='granted') new Notification('Нагадування',{body:note.text.slice(0,100)});
      });
  }, ms);
}
function checkReminders() {
  notes.forEach(n=>{
    if(n.reminder&&!n._fired){
      const ms=new Date(n.reminder).getTime()-Date.now();
      if(ms>0&&ms<60000){n._fired=true;scheduleNotif(n);}
    }
  });
}

// ── FIRESTORE SYNC ──
function startSync() {
  if(unsubN) unsubN(); if(unsubD) unsubD();
  unsubN=onSnapshot(query(notesCol(),orderBy('created','desc')),snap=>{
    notes=snap.docs.map(d=>d.data()); renderNotes();
  });
  unsubD=onSnapshot(query(deletedCol(),orderBy('deletedAt','desc')),snap=>{
    deletedNotes=snap.docs.map(d=>d.data());
    if(currentTab==='deleted') renderNotes();
  });
}

// ── AUTH ──
function hideLoading() {
  const el = document.getElementById('loadingScreen');
  if(el) el.style.display = 'none';
}

function showApp(user) {
  userId = user.uid;
  const el = document.getElementById('userEmail');
  if(el) el.textContent = user.displayName || user.email;
  hideLoading();
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display  = 'flex';
  startSync();
  buildSwatches();
  setInterval(checkReminders, 30000);
}

function showAuth() {
  userId = null;
  hideLoading();
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display  = 'none';
}

// Set persistence to LOCAL so session survives page reload
setPersistence(auth, browserLocalPersistence).then(() => {
  // If user was previously logged in, localStorage will have a Firebase key.
  // We can detect this to avoid flashing the login screen.
  const wasLoggedIn = Object.keys(localStorage).some(k => k.startsWith('firebase:authUser'));

  onAuthStateChanged(auth, user => {
    if(user) {
      // Save flag so next load knows user was logged in
      localStorage.setItem('notes_was_logged_in', '1');
      showApp(user);
    } else {
      // Only show login if user was never logged in before
      const wasLogged = localStorage.getItem('notes_was_logged_in') === '1';
      if(wasLogged) {
        // Wait a bit — Firebase may still be restoring the session
        setTimeout(() => {
          if(!auth.currentUser) {
            localStorage.removeItem('notes_was_logged_in');
            showAuth();
          }
        }, 3000);
      } else {
        showAuth();
      }
    }
  });
});

// ── EVENT DELEGATION (replaces all inline onclick) ──
document.addEventListener('click', e=>{
  const t=e.target.closest('[data-action]');
  if(t){
    e.stopPropagation();
    const {action,id,tab,color}=t.dataset;
    if(action==='edit')       openEdit(id);
    if(action==='complete')   completeNote(id);
    if(action==='restore')    restoreNote(id);
    if(action==='permdelete') permDelete(id);
    if(action==='tab')        switchTab(tab);
    if(action==='new')        openCreateModal();
    if(action==='save')       saveNote();
    if(action==='close')      closeModal();
    if(action==='cleardate')  document.getElementById('reminderInput').value='';
    if(action==='voice')      toggleVoice();
    if(action==='signin') {
      signInWithPopup(auth, new GoogleAuthProvider())
        .catch(e => toast('Помилка входу: ' + (e.code || e.message)));
    }
    if(action==='signout')    { if(unsubN)unsubN(); if(unsubD)unsubD(); signOut(auth); }
    if(action==='color'){
      selColor=color;
      document.querySelectorAll('.color-swatch').forEach(s=>{
        s.classList.toggle('selected',s.dataset.color===color);
        s.style.borderColor=s.dataset.color===color?'#1a1814':'transparent';
      });
    }
    return;
  }
  if(e.target===document.getElementById('noteModal')) closeModal();
});

document.getElementById('searchInput').addEventListener('input',renderNotes);

// ── PWA SERVICE WORKER ──
if('serviceWorker'in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
